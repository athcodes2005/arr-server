- Media:
    - qBittorrent:
        icon: qbittorrent.png
        href: /qbittorrent/
        description: Torrent client
        container: arr-server-qbittorrent-1
        widget:
          type: qbittorrent
          url: http://qbittorrent:8080
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
    - Prowlarr:
        icon: prowlarr.png
        href: /prowlarr/
        description: Indexer manager
        container: arr-server-prowlarr-1
        widget:
          type: prowlarr
          url: http://prowlarr:9696/prowlarr
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
    - Sonarr:
        icon: sonarr.png
        href: /sonarr/
        description: TV manager
        container: arr-server-sonarr-1
        widget:
          type: sonarr
          url: http://sonarr:8989/sonarr
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
    - Radarr:
        icon: radarr.png
        href: /radarr/
        description: Movie manager
        container: arr-server-radarr-1
        widget:
          type: radarr
          url: http://radarr:7878/radarr
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
    - Bazarr:
        icon: bazarr.png
        href: /bazarr/
        description: Subtitle manager
        container: arr-server-bazarr-1
        widget:
          type: bazarr
          url: http://bazarr:6767/bazarr
          key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
    - Byparr:
        icon: mdi-shield-outline
        description: Indexer proxy (FlareSolverr-compatible)
        container: arr-server-byparr-1
        ping: http://byparr:8191/
    - WebDAV:
        icon: mdi-folder-network-outline
        href: /webdav/
        description: Media library browser + WebDAV (read-only)
        container: arr-server-webdav-1
        ping: http://webdav:6065/webdav/
