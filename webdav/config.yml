# This file is rewritten on the Pi by scripts/bootstrap-remote.sh during
# every deploy. No credentials are stored here — auth is handled entirely
# by Caddy (basic_auth directive) at the reverse-proxy layer, so dufs
# can run without auth and trusts the local Docker network.
#
# Why auth at Caddy and not dufs:
#   dufs offers Digest auth by default. Digest requires a nonce challenge on
#   every new TCP connection, so media players that open a new connection per
#   Range request (Infuse, VLC, most FFmpeg-based clients) pay an extra 401
#   round-trip before each chunk — causing seek stalls and buffering. Moving
#   auth to Caddy's basic_auth means clients send credentials preemptively
#   on every Range request, eliminating the round-trip entirely.

serve-path: /media
bind: 0.0.0.0
port: 6065
path-prefix: /webdav
allow-search: true
hidden:
  - ".gitkeep"
log-format: '$remote_addr "$request" $status $http_user_agent'
