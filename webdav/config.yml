# This file is rewritten on the Pi by scripts/bootstrap-remote.sh during
# every deploy so it can safely inject the current WebDAV credentials.
#
# The deployed config uses dufs, which serves the media tree read-only and
# supports both browser navigation and WebDAV clients on the same /webdav/
# path. The committed copy here is only a non-secret reference template.

serve-path: /media
bind: 0.0.0.0
port: 6065
path-prefix: /webdav
allow-search: true
hidden:
  - ".gitkeep"
auth:
  - "admin:change-me@/"
log-format: '$remote_addr $remote_user "$request" $status $http_user_agent'
